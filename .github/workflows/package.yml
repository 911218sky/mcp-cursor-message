# Build and pack VSIX; attach to GitHub Releases when publishing or when pushing v* tags.
name: Package VSIX

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  auto_release:
    # Push to main -> auto bump patch version, create tag, package VSIX, publish release.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Bump patch version and push tag
        id: bump
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          NEXT_VERSION="$(node -e "const fs=require('fs'); const p='./package.json'; const pkg=JSON.parse(fs.readFileSync(p,'utf8')); const [ma,mi,pa]=pkg.version.split('.').map(Number); const next=String(ma)+'.'+String(mi)+'.'+String(pa+1); pkg.version=next; fs.writeFileSync(p, JSON.stringify(pkg, null, '\t')+'\\n'); process.stdout.write(next);")"
          echo "next_version=$NEXT_VERSION" >> "$GITHUB_OUTPUT"

          git add package.json
          git commit -m "chore(release): v$NEXT_VERSION"
          git tag "v$NEXT_VERSION"
          git push origin HEAD:main
          git push origin "v$NEXT_VERSION"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.17

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Compile and pack
        run: bun run package

      - name: Create or update GitHub Release for auto tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: v${{ steps.bump.outputs.next_version }}
        run: |
          set -e
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" *.vsix --clobber
          else
            gh release create "$TAG" *.vsix --generate-notes --verify-tag
          fi

  package:
    # For push events, package only for v* tags.
    if: github.event_name != 'push' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    # `contents: write` is required to upload release assets. Do not use `${{ }}` in `permissions` (breaks workflow parsing).
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.17

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Compile and pack
        run: bun run package

      # Pushing a tag uses “Create GitHub Release from version tag”; branch/PR/manual runs keep the workflow artifact only.
      - name: Upload workflow artifact
        if: github.event_name != 'release' && !startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v7
        with:
          name: vsix
          path: "*.vsix"
          if-no-files-found: error

      # Avoid third-party actions that still declare `node20` (runner deprecation noise). Use `gh` from the image.
      # Publishing a release from the GitHub UI: attach the freshly built VSIX to that release.
      - name: Attach VSIX to published GitHub Release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.event.release.tag_name }}" *.vsix --clobber

      # New version tag push: create the GitHub Release (or only upload if it already exists).
      - name: Create or update GitHub Release for tag
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          TAG="${GITHUB_REF_NAME}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" *.vsix --clobber
          else
            gh release create "$TAG" *.vsix --generate-notes --verify-tag
          fi
