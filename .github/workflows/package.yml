# Build and pack VSIX; attach to GitHub Releases when publishing or when pushing v* tags.
name: Package VSIX

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  package:
    runs-on: ubuntu-latest
    # `contents: write` is required to upload release assets. Do not use `${{ }}` in `permissions` (breaks workflow parsing).
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.17

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Compile and pack
        run: bun run package

      # Pushing a tag uses “Create GitHub Release from version tag”; branch/PR/manual runs keep the workflow artifact only.
      - name: Upload workflow artifact
        if: github.event_name != 'release' && !startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v7
        with:
          name: vsix
          path: "*.vsix"
          if-no-files-found: error

      # Avoid third-party actions that still declare `node20` (runner deprecation noise). Use `gh` from the image.
      # Publishing a release from the GitHub UI: attach the freshly built VSIX to that release.
      - name: Attach VSIX to published GitHub Release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.event.release.tag_name }}" *.vsix --clobber

      # New version tag push: create the GitHub Release (or only upload if it already exists).
      - name: Create or update GitHub Release for tag
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          TAG="${GITHUB_REF_NAME}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" *.vsix --clobber
          else
            gh release create "$TAG" *.vsix --generate-notes --verify-tag
          fi
