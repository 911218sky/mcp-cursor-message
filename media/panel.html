<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta
		http-equiv="Content-Security-Policy"
		content="default-src 'none'; style-src {{CSP}}; font-src {{CSP}}; script-src 'nonce-{{NONCE}}' {{CSP}};"
	/>
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>mcp-cursor-message</title>
	<link rel="stylesheet" href="{{STYLE_URI}}" />
</head>
<body class="app">
	<header class="topbar" aria-label="Header">
		<div class="topbar-accent" aria-hidden="true"></div>
		<div class="topbar-inner">
			<div class="topbar-brand">
				<div class="topbar-logo" aria-hidden="true">
					<svg class="topbar-logo-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
						<path
							d="M5 4.25h11.5A2.75 2.75 0 0 1 19.25 7v5.5A2.75 2.75 0 0 1 16.5 15.25h-3.9l-4.1 3.65V15.25H7A2.75 2.75 0 0 1 4.25 12.5V7A2.75 2.75 0 0 1 7 4.25Z"
							stroke="rgba(255,255,255,0.96)"
							stroke-width="1.5"
							stroke-linejoin="round"
						/>
						<path
							d="M8 8.25h8M8 11h5"
							stroke="rgba(255,255,255,0.55)"
							stroke-width="1.35"
							stroke-linecap="round"
						/>
					</svg>
				</div>
				<div class="topbar-titles">
					<div class="topbar-heading">
						<span class="topbar-title" id="chromeTopbarTitle">MCP chat</span>
						<span class="topbar-badge" title="Model Context Protocol">MCP</span>
					</div>
					<p class="topbar-sub" id="chromeTopbarSub">
						Queue into Cursor · model pulls with <code>check_messages</code>
					</p>
				</div>
			</div>
			<div class="topbar-lang" id="chromeLangWrap">
				<label class="topbar-lang-label" for="uiLanguageSelect" id="chromeLangLabel">Language</label>
				<select
					id="uiLanguageSelect"
					class="topbar-lang-select"
					aria-labelledby="chromeLangLabel"
				>
					<option value="en">English</option>
					<option value="zh">繁體中文</option>
					<option value="auto">Auto</option>
				</select>
			</div>
		</div>
	</header>

	<main class="scroll" id="mainScroll">
		<div class="main-tabs" role="tablist" aria-label="Main tabs">
			<button
				type="button"
				class="main-tab"
				role="tab"
				id="tabMain"
				aria-selected="true"
				aria-controls="panelMain"
			>
				<svg class="main-tab-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true">
					<path
						d="M4 6h16M4 12h10M4 18h14"
						stroke="currentColor"
						stroke-width="2"
						stroke-linecap="round"
					/>
				</svg>
				<span class="main-tab-text" id="chromeTabMain">Content</span>
			</button>
			<button
				type="button"
				class="main-tab"
				role="tab"
				id="tabToken"
				aria-selected="false"
				aria-controls="panelToken"
			>
				<svg class="main-tab-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true">
					<path
						d="M7 7h10M7 12h6M7 17h10"
						stroke="currentColor"
						stroke-width="2"
						stroke-linecap="round"
					/>
					<circle cx="17" cy="7" r="2" fill="currentColor" />
				</svg>
				<span class="main-tab-text" id="chromeTabToken">Token</span>
			</button>
		</div>

		<div id="panelMain" class="main-tab-panel" role="tabpanel" aria-labelledby="tabMain">
		<div id="questionCard" class="card card--question hidden">
			<div class="card-head">
				<span class="card-icon card-icon--q" aria-hidden="true"></span>
				<div class="card-title" id="chromeQuestionCardTitle">Your choice needed</div>
			</div>
			<div id="questionBody"></div>
		</div>

		<div id="replyCard" class="card card--reply hidden">
			<div class="card-head">
				<span class="card-icon card-icon--reply" aria-hidden="true"></span>
				<div class="card-title" id="chromeReplyTitle">AI reply summary</div>
			</div>
			<div id="replyContent" class="reply-content"></div>
			<button id="replyAck" class="btn btn-ghost btn-block" type="button">
				Dismiss
			</button>
		</div>

		<div class="card card--queue">
			<div class="card-head">
				<span class="card-icon card-icon--queue" aria-hidden="true"></span>
				<div class="card-title" id="chromeQueueTitle">Outbound queue</div>
			</div>
			<div id="queuePreview" class="queue-preview"></div>
		</div>
		</div>

		<div
			id="panelToken"
			class="main-tab-panel hidden"
			role="tabpanel"
			aria-labelledby="tabToken"
		>
			<section class="card card--token" aria-label="Approximate queue token stats">
				<div class="card-head">
					<span class="card-icon card-icon--tok" aria-hidden="true"></span>
					<div class="card-title" id="chromeTokenCardTitle">Queue tokens (estimate)</div>
				</div>
				<p class="token-hint" id="chromeTokenHint">
					Approximate tokens for sidebar-queued text/images/files—not Cursor billing.
				</p>
				<div class="token-grid">
					<div class="token-cell">
						<span class="token-label" id="chromeTokenTotalLabel">Total</span>
						<strong class="token-val" id="tokenTotal">—</strong>
					</div>
					<div class="token-cell">
						<span class="token-label" id="chromeTokenLastLabel">Last</span>
						<strong class="token-val" id="tokenLast">—</strong>
					</div>
				</div>
				<button type="button" class="btn btn-ghost btn-block token-reset-btn" id="btnResetTokens">
					Reset stats
				</button>
			</section>
		</div>
	</main>

	<footer class="composer" aria-label="Composer">
		<div class="composer-panel">
			<label class="composer-label" for="msgInput">
				<span class="composer-label-text" id="chromeComposerLabel">To AI</span>
				<span class="composer-kbd-hint" id="chromeComposerHint"
					>Enter to send · Shift+Enter newline · paste images from clipboard</span
				>
			</label>
			<div class="composer-field">
				<textarea
					id="msgInput"
					class="compose-input"
					rows="3"
					placeholder="Type a message…"
					spellcheck="false"
				></textarea>
				<div
					class="composer-paste-strip hidden"
					id="composerPasteStrip"
					aria-live="polite"
				>
					<div class="composer-paste-thumb-wrap">
						<img
							id="composerPasteThumb"
							class="composer-paste-thumb"
							alt=""
						/>
						<button
							type="button"
							id="btnRemovePendingPaste"
							class="composer-paste-remove"
							aria-label="Remove staged image"
						>
							×
						</button>
					</div>
				</div>
			</div>
			<div class="composer-attach" role="group" aria-label="Attach image or file">
				<button type="button" id="btnPickImage" class="btn btn-attach">
					<svg class="btn-attach-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true">
						<rect
							x="3"
							y="5"
							width="18"
							height="14"
							rx="2"
							stroke="currentColor"
							stroke-width="1.75"
						/>
						<circle cx="8.5" cy="10" r="1.5" fill="currentColor" />
						<path
							d="M21 15l-5-5-4 4-3-3-6 6"
							stroke="currentColor"
							stroke-width="1.75"
							stroke-linecap="round"
							stroke-linejoin="round"
						/>
					</svg>
					<span id="chromeBtnImageLabel">Image</span>
				</button>
				<button type="button" id="btnPickFile" class="btn btn-attach">
					<svg class="btn-attach-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true">
						<path
							d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"
							stroke="currentColor"
							stroke-width="1.75"
							stroke-linejoin="round"
						/>
						<polyline points="14 2 14 8 20 8" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" />
					</svg>
					<span id="chromeBtnFileLabel">File</span>
				</button>
			</div>
			<div class="composer-row">
				<span class="hint" aria-hidden="true" id="chromeComposerAttachHint"
					>Pick attachments · Ctrl+V paste image in box</span
				>
				<button id="sendBtn" class="btn btn-primary btn-send" type="button" disabled>
					<svg class="btn-send-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" aria-hidden="true">
						<path
							d="M22 2 11 13M22 2l-7 20-4-9-9-4 20-7Z"
							stroke="currentColor"
							stroke-width="2"
							stroke-linecap="round"
							stroke-linejoin="round"
						/>
					</svg>
					<span class="btn-send-label" id="chromeSendLabel">Send</span>
				</button>
			</div>
		</div>
	</footer>

	<script nonce="{{NONCE}}" src="{{SCRIPT_URI}}"></script>
</body>
</html>
