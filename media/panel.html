<!DOCTYPE html>
<html lang="zh-Hant">
<head>
	<meta charset="UTF-8" />
	<meta
		http-equiv="Content-Security-Policy"
		content="default-src 'none'; style-src {{CSP}}; font-src {{CSP}}; script-src 'nonce-{{NONCE}}' {{CSP}};"
	/>
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>mcp-cursor-message</title>
	<link rel="stylesheet" href="{{STYLE_URI}}" />
</head>
<body class="app">
	<header class="topbar" aria-label="標題列">
		<div class="topbar-accent" aria-hidden="true"></div>
		<div class="topbar-inner">
			<div class="topbar-brand">
				<div class="topbar-logo" aria-hidden="true">
					<svg class="topbar-logo-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
						<path
							d="M5 4.25h11.5A2.75 2.75 0 0 1 19.25 7v5.5A2.75 2.75 0 0 1 16.5 15.25h-3.9l-4.1 3.65V15.25H7A2.75 2.75 0 0 1 4.25 12.5V7A2.75 2.75 0 0 1 7 4.25Z"
							stroke="rgba(255,255,255,0.96)"
							stroke-width="1.5"
							stroke-linejoin="round"
						/>
						<path
							d="M8 8.25h8M8 11h5"
							stroke="rgba(255,255,255,0.55)"
							stroke-width="1.35"
							stroke-linecap="round"
						/>
					</svg>
				</div>
				<div class="topbar-titles">
					<div class="topbar-heading">
						<span class="topbar-title">MCP 對話</span>
						<span class="topbar-badge" title="Model Context Protocol">MCP</span>
					</div>
					<p class="topbar-sub">
						佇列送入 Cursor · 模型以 <code>check_messages</code> 拉取
					</p>
				</div>
			</div>
		</div>
	</header>

	<main class="scroll" id="mainScroll">
		<div class="main-tabs" role="tablist" aria-label="主區分頁">
			<button
				type="button"
				class="main-tab"
				role="tab"
				id="tabMain"
				aria-selected="true"
				aria-controls="panelMain"
			>
				<svg class="main-tab-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true">
					<path
						d="M4 6h16M4 12h10M4 18h14"
						stroke="currentColor"
						stroke-width="2"
						stroke-linecap="round"
					/>
				</svg>
				<span class="main-tab-text">內容</span>
			</button>
			<button
				type="button"
				class="main-tab"
				role="tab"
				id="tabToken"
				aria-selected="false"
				aria-controls="panelToken"
			>
				<svg class="main-tab-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true">
					<path
						d="M7 7h10M7 12h6M7 17h10"
						stroke="currentColor"
						stroke-width="2"
						stroke-linecap="round"
					/>
					<circle cx="17" cy="7" r="2" fill="currentColor" />
				</svg>
				<span class="main-tab-text">Token</span>
			</button>
		</div>

		<div id="panelMain" class="main-tab-panel" role="tabpanel" aria-labelledby="tabMain">
		<div id="questionCard" class="card card--question hidden">
			<div class="card-head">
				<span class="card-icon card-icon--q" aria-hidden="true"></span>
				<div class="card-title">需要你的選擇</div>
			</div>
			<div id="questionBody"></div>
		</div>

		<div id="replyCard" class="card card--reply hidden">
			<div class="card-head">
				<span class="card-icon card-icon--reply" aria-hidden="true"></span>
				<div class="card-title">AI 回覆摘要</div>
			</div>
			<div id="replyContent" class="reply-content"></div>
			<button id="replyAck" class="btn btn-ghost btn-block" type="button">已閱</button>
		</div>

		<div class="card card--queue">
			<div class="card-head">
				<span class="card-icon card-icon--queue" aria-hidden="true"></span>
				<div class="card-title">待送佇列</div>
			</div>
			<div id="queuePreview" class="queue-preview"></div>
		</div>
		</div>

		<div
			id="panelToken"
			class="main-tab-panel hidden"
			role="tabpanel"
			aria-labelledby="tabToken"
		>
			<section class="card card--token" aria-label="佇列 token 約略統計">
				<div class="card-head">
					<span class="card-icon card-icon--tok" aria-hidden="true"></span>
					<div class="card-title">佇列 Token（約略）</div>
				</div>
				<p class="token-hint">
					統計本側欄送入佇列的文字／圖片／檔案，非 Cursor 官方帳單。
				</p>
				<div class="token-grid">
					<div class="token-cell">
						<span class="token-label">累計</span>
						<strong class="token-val" id="tokenTotal">—</strong>
					</div>
					<div class="token-cell">
						<span class="token-label">上一則</span>
						<strong class="token-val" id="tokenLast">—</strong>
					</div>
				</div>
				<button type="button" class="btn btn-ghost btn-block token-reset-btn" id="btnResetTokens">
					重設統計
				</button>
			</section>
		</div>
	</main>

	<footer class="composer" aria-label="輸入區">
		<div class="composer-panel">
			<label class="composer-label" for="msgInput">
				<span class="composer-label-text">傳給 AI</span>
				<span class="composer-kbd-hint">Enter 送出 · Shift+Enter 換行 · 可貼上剪貼簿圖片</span>
			</label>
			<div class="composer-field">
				<textarea
					id="msgInput"
					class="compose-input"
					rows="3"
					placeholder="輸入訊息…"
					spellcheck="false"
				></textarea>
			</div>
			<div class="composer-attach" role="group" aria-label="附加圖片或檔案">
				<button type="button" id="btnPickImage" class="btn btn-attach">
					<svg class="btn-attach-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true">
						<rect
							x="3"
							y="5"
							width="18"
							height="14"
							rx="2"
							stroke="currentColor"
							stroke-width="1.75"
						/>
						<circle cx="8.5" cy="10" r="1.5" fill="currentColor" />
						<path
							d="M21 15l-5-5-4 4-3-3-6 6"
							stroke="currentColor"
							stroke-width="1.75"
							stroke-linecap="round"
							stroke-linejoin="round"
						/>
					</svg>
					圖片
				</button>
				<button type="button" id="btnPickFile" class="btn btn-attach">
					<svg class="btn-attach-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true">
						<path
							d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"
							stroke="currentColor"
							stroke-width="1.75"
							stroke-linejoin="round"
						/>
						<polyline points="14 2 14 8 20 8" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" />
					</svg>
					檔案
				</button>
			</div>
			<div class="composer-row">
				<span class="hint" aria-hidden="true">選擇器加入附件 · 輸入框內 Ctrl+V 貼圖</span>
				<button id="sendBtn" class="btn btn-primary btn-send" type="button" disabled>
					<svg class="btn-send-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" aria-hidden="true">
						<path
							d="M22 2 11 13M22 2l-7 20-4-9-9-4 20-7Z"
							stroke="currentColor"
							stroke-width="2"
							stroke-linecap="round"
							stroke-linejoin="round"
						/>
					</svg>
					<span class="btn-send-label">送出</span>
				</button>
			</div>
		</div>
	</footer>

	<script nonce="{{NONCE}}" src="{{SCRIPT_URI}}"></script>
</body>
</html>
