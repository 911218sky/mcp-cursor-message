<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta
		http-equiv="Content-Security-Policy"
		content="default-src 'none'; img-src data: blob: {{CSP}}; style-src {{CSP}}; font-src {{CSP}}; script-src 'nonce-{{NONCE}}' {{CSP}};"
	/>
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>mcp-cursor-message</title>
	<link rel="stylesheet" href="{{STYLE_URI}}" />
</head>
<body class="app">
	<div class="app-shell">
	<header class="topbar" aria-label="Header">
		<div class="topbar-accent" aria-hidden="true"></div>
		<div class="topbar-inner">
			<div class="topbar-brand">
				<div class="topbar-logo" aria-hidden="true">
					<svg class="topbar-logo-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
						<path
							d="M5 4.25h11.5A2.75 2.75 0 0 1 19.25 7v5.5A2.75 2.75 0 0 1 16.5 15.25h-3.9l-4.1 3.65V15.25H7A2.75 2.75 0 0 1 4.25 12.5V7A2.75 2.75 0 0 1 7 4.25Z"
							stroke="rgba(255,255,255,0.96)"
							stroke-width="1.5"
							stroke-linejoin="round"
						/>
						<path
							d="M8 8.25h8M8 11h5"
							stroke="rgba(255,255,255,0.55)"
							stroke-width="1.35"
							stroke-linecap="round"
						/>
					</svg>
				</div>
				<div class="topbar-titles">
					<div class="topbar-heading">
						<span class="topbar-title" id="chromeTopbarTitle">MCP chat</span>
						<span class="topbar-badge" title="Model Context Protocol">MCP</span>
					</div>
					<p class="topbar-sub" id="chromeTopbarSub">
						Queue into Cursor · model pulls with <code>check_messages</code>
					</p>
				</div>
			</div>
		</div>
	</header>

	<main class="scroll" id="mainScroll">
		<div id="panelMain" class="main-tab-panel">
		<div class="card card--history">
			<div class="card-head">
				<div class="card-head-main">
					<span class="card-icon card-icon--history" aria-hidden="true"></span>
					<div class="card-title" id="chromeHistoryTitle">Conversation history</div>
				</div>
				<button id="btnToggleHistoryPanel" class="history-panel-toggle" type="button">Collapse</button>
			</div>
			<div id="historyList" class="history-list"></div>
			<button id="btnClearHistory" class="btn btn-ghost btn-block" type="button">
				Clear history
			</button>
		</div>

		<div class="card card--queue">
			<div class="card-head">
				<span class="card-icon card-icon--queue" aria-hidden="true"></span>
				<div class="card-title" id="chromeQueueTitle">Outbound queue</div>
			</div>
			<div id="queuePreview" class="queue-preview"></div>
		</div>
		</div>
	</main>
	<footer class="composer" aria-label="Composer">
		<div class="composer-panel">
			<label class="composer-label" for="msgInput">
				<span class="composer-label-text" id="chromeComposerLabel">To AI</span>
				<span class="composer-kbd-hint" id="chromeComposerHint"
					>Enter to send · Shift+Enter newline · paste images from clipboard</span
				>
			</label>
			<div id="aiRunStatus" class="ai-run-status" role="status" aria-live="polite"></div>
			<div class="composer-field">
				<textarea
					id="msgInput"
					class="compose-input"
					rows="3"
					placeholder="Type a message…"
					spellcheck="false"
				></textarea>
				<div
					class="composer-paste-strip hidden"
					id="composerPasteStrip"
					aria-live="polite"
				>
					<div id="composerPasteThumbs" class="composer-paste-thumbs"></div>
				</div>
			</div>
			<div class="composer-attach" role="group" aria-label="Attach image or file">
				<button type="button" id="btnPickImage" class="btn btn-attach">
					<svg class="btn-attach-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true">
						<rect
							x="3"
							y="5"
							width="18"
							height="14"
							rx="2"
							stroke="currentColor"
							stroke-width="1.75"
						/>
						<circle cx="8.5" cy="10" r="1.5" fill="currentColor" />
						<path
							d="M21 15l-5-5-4 4-3-3-6 6"
							stroke="currentColor"
							stroke-width="1.75"
							stroke-linecap="round"
							stroke-linejoin="round"
						/>
					</svg>
					<span id="chromeBtnImageLabel">Image</span>
				</button>
				<button type="button" id="btnPickFile" class="btn btn-attach">
					<svg class="btn-attach-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true">
						<path
							d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"
							stroke="currentColor"
							stroke-width="1.75"
							stroke-linejoin="round"
						/>
						<polyline points="14 2 14 8 20 8" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" />
					</svg>
					<span id="chromeBtnFileLabel">File</span>
				</button>
				<button type="button" id="btnOpenSettings" class="btn btn-attach">
					<span id="chromeSettingsBtn">Settings</span>
				</button>
			</div>
			<div class="composer-row">
				<span class="hint" aria-hidden="true" id="chromeComposerAttachHint"
					>Pick attachments · Ctrl+V paste image in box</span
				>
				<span class="hint token-inline" id="tokenInline">Token: —</span>
				<button id="sendBtn" class="btn btn-primary btn-send" type="button" disabled>
					<svg class="btn-send-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" aria-hidden="true">
						<path
							d="M22 2 11 13M22 2l-7 20-4-9-9-4 20-7Z"
							stroke="currentColor"
							stroke-width="2"
							stroke-linecap="round"
							stroke-linejoin="round"
						/>
					</svg>
					<span class="btn-send-label" id="chromeSendLabel">Send</span>
				</button>
			</div>
		</div>
	</footer>
	</div>
	<div id="settingsDialog" class="settings-dialog hidden" role="dialog" aria-modal="true" aria-labelledby="chromeSettingsTitle">
		<div class="settings-card">
			<div class="settings-head">
				<div class="card-title" id="chromeSettingsTitle">Settings</div>
				<button id="btnCloseSettings" class="history-panel-toggle" type="button">Close</button>
			</div>
			<div class="topbar-control">
				<label class="topbar-lang-label" for="fontSizeSelect" id="chromeFontSizeLabel">Text</label>
				<select
					id="fontSizeSelect"
					class="topbar-lang-select"
					aria-labelledby="chromeFontSizeLabel"
				>
					<option value="sm">Small</option>
					<option value="md">Medium</option>
					<option value="lg">Large</option>
				</select>
			</div>
			<div class="topbar-control">
				<label class="topbar-lang-label" for="enabledToggle" id="chromeEnabledLabel">Enabled</label>
				<div class="topbar-toggle-row">
					<input id="enabledToggle" type="checkbox" class="topbar-toggle-input" />
					<span id="chromeEnabledHint" class="topbar-toggle-hint">On</span>
				</div>
			</div>
			<div class="topbar-control" id="chromeLangWrap">
				<label class="topbar-lang-label" for="uiLanguageSelect" id="chromeLangLabel">Language</label>
				<select
					id="uiLanguageSelect"
					class="topbar-lang-select"
					aria-labelledby="chromeLangLabel"
				>
					<option value="en">English</option>
					<option value="zh">繁體中文</option>
					<option value="auto">Auto</option>
				</select>
			</div>
		</div>
	</div>
	<div id="questionCard" class="settings-dialog hidden" role="dialog" aria-modal="true" aria-labelledby="chromeQuestionCardTitle">
		<div class="settings-card question-dialog-card">
			<div class="card-head">
				<span class="card-icon card-icon--q" aria-hidden="true"></span>
				<div class="card-title" id="chromeQuestionCardTitle">Your choice needed</div>
			</div>
			<div id="questionBody"></div>
		</div>
	</div>

	<script nonce="{{NONCE}}" src="{{SCRIPT_URI}}"></script>
</body>
</html>
